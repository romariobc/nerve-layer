# ================================================================
# event.schema.yaml — Nerve Layer · Base Event Contract v1.0.0
# ================================================================
# Para adicionar novo evento:
#   1. Adicionar nome em Event.name.enum
#   2. Criar schemas/events/<event-name>.yaml com payload tipado
#   3. Adicionar rota em routing-table.yaml
#   4. Incrementar schema_version (MINOR se payload novo, PATCH se ajuste)
# ================================================================

$schema: "https://json-schema.org/draft/2020-12"
$id: "nerve-layer/schemas/event.schema.yaml"
title: NerveEvent
type: object
required: [id, name, source, timestamp, payload, routing, meta]

properties:
  id:
    type: string
    format: uuid
    description: Idempotency key — UUID v4 gerado pelo emissor.

  name:
    type: string
    enum:
      - project.status.changed
      - pr.merged
      - code.pushed